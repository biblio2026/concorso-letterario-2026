<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Concorso Letterario</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      margin:0;
      color:#222;
    }

    header{
      background:#111827;
      color:white;
      padding:50px 20px;
      text-align:center;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:30px 20px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      margin-bottom:20px;
    }

    label{
      font-weight:bold;
      display:block;
      margin-top:10px;
      margin-bottom:5px;
    }

    input, select, textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      margin-top:15px;
      width:100%;
      padding:12px;
      background:#111827;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:disabled{
      background:#888;
      cursor:not-allowed;
    }

    .privacy{
      display:flex;
      gap:10px;
      margin-top:15px;
      align-items:flex-start;
    }

    .privacy input{
      width:auto;
      margin-top:4px;
    }
  </style>
</head>

<body>

<header>
  <h1>Concorso Letterario 2026</h1>
</header>

<div class="container">

  <div class="card">

    <form id="form">

      <label>Nome e Cognome</label>
      <input type="text" name="nome" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Anno di nascita</label>
      <input type="number" name="anno_nascita" min="1900" max="2026" required>

      <label>Cittŕ di residenza</label>
      <input type="text" name="citta" required>

      <label>Provincia</label>
      <input type="text" name="provincia" maxlength="2" required>

      <label>Titolo racconto</label>
      <input type="text" name="titolo" required>

      <label>Categoria</label>
      <select name="categoria" required>
        <option value="">Seleziona</option>
        <option>Narrativa</option>
        <option>Fantasy</option>
        <option>Giallo</option>
        <option>Fantascienza</option>
      </select>

      <label>Carica racconto (PDF/DOC)</label>
      <input type="file" name="racconto" id="file" accept=".pdf,.doc,.docx" required disabled>

      <div class="privacy">
        <input type="checkbox" id="privacy" required>
        <label for="privacy">
          Accetto privacy e trattamento dati GDPR
        </label>
      </div>

      <button type="submit" id="submit" disabled>
        Invia iscrizione
      </button>

    </form>

  </div>

</div>

<script>
const privacy = document.getElementById("privacy");
const file = document.getElementById("file");
const submit = document.getElementById("submit");

privacy.addEventListener("change", () => {
  file.disabled = !privacy.checked;
  submit.disabled = !privacy.checked;
});
</script>

</body>
</html>
